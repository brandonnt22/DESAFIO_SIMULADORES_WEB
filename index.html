<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Simuladores Matemáticos</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
</head>

<body>

    <!-- Fondo animado -->
    <div class="burbujas">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <header>
        <h1>🧮 Simuladores Matemáticos</h1>
        <p>
            Transferencia de Calor y Combinaciones Matemáticas
        </p>
        <div class="onda"></div>
    </header>

    <main class="contenedor">
        <!-- SIMULADOR 1 -->
        <section class="tarjeta">
            
            <h2>🔥 Transferencia de Calor</h2>
            <form>

                <div class="grupo">
                    <label for="t0">
                        Temperatura Inicial (T₀)
                    </label>
                    <input type="number" id="t0" value="120" required>
                </div>

                <div class="grupo">
                    <label for="ts">
                        Temperatura del Entorno (Ts)
                    </label>
                    <input type="number" id="ts" value="38" required>
                </div>

                <div class="grupo">
                    <label for="k">
                        Constante (k)
                    </label>
                    <input type="number" step="0.01" id="k" value="0.45" required>
                </div>

                <div class="grupo">
                    <label for="tiempo">
                        Tiempo (horas)
                    </label>
                    <input type="number" id="tiempo" value="3" min="0" required>
                </div>

                <button type="button" onclick="calcularTemperatura()">
                    Calcular Temperatura
                </button>
            </form>

            <div id="resultadoCalor" class="resultado">
                Resultado aparecerá aquí
            </div>
        </section>

        <!-- SIMULADOR 2 -->

        <section class="tarjeta">

            <h2>🎲 Combinaciones del Sorteo</h2>

            <form>
                <h3>Grupo 1</h3>

                <div class="grupo">
                    <label for="n1">n₁</label>
                    <input type="number" id="n1" value="59" min="0" required>
                </div>

                <div class="grupo">
                    <label for="r1">r₁</label>
                    <input type="number" id="r1" value="5" min="0" required>
                </div>

                <h3>Grupo 2</h3>

                <div class="grupo">
                    <label for="n2">n₂</label>
                    <input type="number" id="n2" value="35" min="0" required>
                </div>

                <div class="grupo">
                    <label for="r2">r₂</label>
                    <input type="number" id="r2" value="1" min="0" required>
                </div>

                <button type="button" onclick="calcularCombinaciones()">
                    Calcular Combinaciones
                </button>
            </form>

            <div id="resultadoCombinaciones" class="resultado">
                Resultado aparecerá aquí
            </div>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
